name: crypto_tracker_app
description: "A production-grade crypto market tracker built with Feature-First Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & dependency injection
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local persistence / caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity / offline detection
  connectivity_plus: ^6.1.0

  # Image loading
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Value equality for immutable entities/states
  equatable: ^2.0.7

  # Formatting & i18n
  intl: ^0.20.2

  # Native launch splash (preserve/remove while prefetching)
  flutter_native_splash: ^2.4.6

  # Android: sync refresh rate with system battery saver vs performance mode
  battery_plus: ^6.2.2
  flutter_displaymode: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  fake_async: ^1.3.3
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#00C9A7"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#00C9A7"
  image: assets/icon/app_icon.png
  color_dark: "#00C9A7"
  image_dark: assets/icon/app_icon.png
  android_12:
    color: "#00C9A7"
    icon_background_color: "#00C9A7"
    image: assets/icon/app_icon_splash12.png
    color_dark: "#00C9A7"
    icon_background_color_dark: "#00C9A7"
    image_dark: assets/icon/app_icon_splash12.png
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true
  generate: true
