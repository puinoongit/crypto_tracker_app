# Static analysis configuration for the crypto_tracker_app.
#
# We extend the recommended Flutter lint set and enable a few additional
# rules that enforce the conventions used across this codebase.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "lib/core/localization/generated/**"
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat missing returns and dead code as errors to keep the tree honest.
    missing_required_param: error
    missing_return: error
    todo: ignore

linter:
  rules:
    prefer_single_quotes: true
    always_declare_return_types: true
    avoid_redundant_argument_values: true
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_final_locals: true
    unawaited_futures: true
    require_trailing_commas: true
    sort_child_properties_last: true
    use_key_in_widget_constructors: true
    # Disabled intentionally: our DI constructors take *named* dependencies that
    # initialize *private* fields (e.g. `{required X remote}) : _remote = remote`).
    # Named parameters cannot be private, so initializing formals are impossible
    # here and the lint would only produce unfollowable noise.
    prefer_initializing_formals: false
